<!DOCTYPE html>
<html>

<head>

<title>NeuralVerse Dashboard</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<h1>My Worlds</h1>

<div id="worlds"></div>

<input id="title" placeholder="World name">

<input id="description" placeholder="Description">

<button onclick="createWorld()">Create World</button>

<script>

async function loadWorlds(){

const res = await fetch("/api/worlds")

const data = await res.json()

const container = document.getElementById("worlds")

container.innerHTML=""

data.forEach(w=>{

const div=document.createElement("div")

div.innerHTML = "<h3>"+w.title+"</h3><p>"+w.description+"</p>"

container.appendChild(div)

})

}

async function createWorld(){

const title=document.getElementById("title").value
const description=document.getElementById("description").value

await fetch("/api/worlds/create",{

method:"POST",

headers:{ "Content-Type":"application/json" },

body:JSON.stringify({title,description})

})

loadWorlds()

}

loadWorlds()

</script>

</body>

</html>
